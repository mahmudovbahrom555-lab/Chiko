name: chiko
description: B2B Trade Messenger — wholesale market communication platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # Networking
  dio: ^5.4.3
  supabase_flutter: ^2.5.0

  # Push notifications
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1
  flutter_local_notifications: ^17.1.2

  # QR code
  qr_flutter: ^4.1.0

  # Excel import
  file_picker: ^8.0.3

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  record: ^5.1.2       # voice messages
  just_audio: ^0.9.40  # voice playback
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true  # enables flutter gen-l10n from l10n.yaml

  assets:
    - assets/images/
    - assets/icons/
